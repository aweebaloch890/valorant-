<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: transparent; color: white; font-family: 'Segoe UI', sans-serif; text-transform: uppercase; overflow: hidden; }
        
        /* Professional VCT Top Bar */
        .vct-container { position: absolute; top: 0; left: 50%; transform: translateX(-50%); display: flex; align-items: center; background: rgba(15, 25, 35, 0.95); border-bottom: 3px solid #ff4655; padding: 10px 50px; clip-path: polygon(0 0, 100% 0, 95% 100%, 5% 100%); min-width: 650px; justify-content: space-between; }
        
        .team-name { font-size: 26px; font-weight: 800; width: 220px; letter-spacing: 1px; }
        .score-box { background: #ff4655; font-size: 45px; font-weight: 900; padding: 0 25px; margin: 0 15px; min-width: 60px; text-align: center; box-shadow: 0 0 15px rgba(255, 70, 85, 0.4); }
        .match-info { text-align: center; font-size: 14px; opacity: 0.8; line-height: 1.2; }

        /* Players Side Panels (VCT Style) */
        .players-panel { position: absolute; bottom: 80px; width: 320px; }
        .left-panel { left: 40px; }
        .right-panel { right: 40px; }
        .p-row { background: rgba(20, 20, 20, 0.8); margin: 6px 0; height: 45px; display: flex; align-items: center; border-left: 5px solid #00adff; position: relative; overflow: hidden; }
        .right-panel .p-row { border-left: none; border-right: 5px solid #ff4655; flex-direction: row-reverse; }
        .hp-bar { position: absolute; top: 0; left: 0; height: 100%; background: rgba(0, 173, 255, 0.2); transition: width 0.5s ease; z-index: 1; }
    </style>
</head>
<body>
    <div class="vct-container">
        <div class="team-name" style="text-align: right;" id="tA_name">TEAM A</div>
        <div style="display: flex; align-items: center;">
            <div class="score-box" id="tA_score">0</div>
            <div class="match-info">ROUND<br><span id="round" style="font-size: 22px; font-weight: bold;">1</span></div>
            <div class="score-box" id="tB_score">0</div>
        </div>
        <div class="team-name" id="tB_name">TEAM B</div>
    </div>

    <div class="players-panel left-panel" id="playersA"></div>
    <div class="players-panel right-panel" id="playersB"></div>

    <script>
        async function fetchMatchData() {
            try {
                const response = await fetch('/api/match');
                const data = await response.json();
                
                if (data.teamA) {
                    // Update Names & Scores
                    document.getElementById('tA_name').innerText = data.teamA.name;
                    document.getElementById('tB_name').innerText = data.teamB.name;
                    document.getElementById('tA_score').innerText = data.teamA.score;
                    document.getElementById('tB_score').innerText = data.teamB.score;
                    document.getElementById('round').innerText = data.current_round || "1";

                    // Update Players HUD (Health Bars)
                    renderPlayers(data.teamA.players, 'playersA', true);
                    renderPlayers(data.teamB.players, 'playersB', false);
                }
            } catch (err) { console.error("Sync Error:", err); }
        }

        function renderPlayers(players, containerId, isLeft) {
            let html = '';
            players.forEach(p => {
                html += `<div class="p-row">
                    <div class="hp-bar" style="width: ${p.hp}%"></div>
                    <div style="position:relative; z-index:2; padding: 0 15px; width:100%; display:flex; justify-content:space-between;">
                        <span>${p.name}</span> <span style="font-size:12px;">${p.hp} HP</span>
                    </div>
                </div>`;
            });
            document.getElementById(containerId).innerHTML = html;
        }

        setInterval(fetchMatchData, 1000); // Har 1 second baad sync karega
        fetchMatchData();
    </script>
</body>
</html>
