<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; background: transparent; }
        .vct-top-bar { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; background: rgba(15, 25, 35, 0.9); border-bottom: 3px solid #ff4655; padding: 5px 40px; clip-path: polygon(5% 0, 95% 0, 100% 100%, 0 100%); }
        .score { font-size: 40px; font-weight: bold; margin: 0 20px; min-width: 50px; text-align: center; background: #ff4655; }
        
        /* Side Player Panels */
        .side-panel { position: absolute; bottom: 100px; width: 300px; }
        .left-side { left: 20px; }
        .right-side { right: 20px; }
        .player-row { display: flex; align-items: center; background: rgba(0,0,0,0.7); margin: 5px 0; height: 40px; border-left: 4px solid #00adff; }
        .hp-bar { height: 100%; background: #ff4655; transition: width 0.3s; }
        .player-name { padding-left: 10px; flex-grow: 1; font-size: 14px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="vct-top-bar">
        <div id="teamA_name">TEAM OWL</div>
        <div class="score" id="scoreA">0</div>
        <div style="font-size: 12px; opacity: 0.6;">ROUND 1</div>
        <div class="score" id="scoreB">0</div>
        <div id="teamB_name">TRIANGLES</div>
    </div>

    <div class="side-panel left-side" id="playersA"></div>
    <div class="side-panel right-side" id="playersB"></div>

    <script>
        async function updateHUD() {
            const res = await fetch('/api/match');
            const data = await res.json();
            if(!data.teamA) return;

            document.getElementById('scoreA').innerText = data.teamA.score;
            document.getElementById('scoreB').innerText = data.teamB.score;
            document.getElementById('teamA_name').innerText = data.teamA.name;
            document.getElementById('teamB_name').innerText = data.teamB.name;

            // Render Players A
            let htmlA = '';
            data.teamA.players.forEach(p => {
                htmlA += `<div class="player-row"><div class="hp-bar" style="width:${p.hp}%"></div><div class="player-name">${p.name}</div></div>`;
            });
            document.getElementById('playersA').innerHTML = htmlA;
        }
        setInterval(updateHUD, 1000);
    </script>
</body>
</html>
