<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #0f1923; color: white; padding: 20px; }
        .card { background: #1f2326; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        input { background: #333; color: white; border: 1px solid #ff4655; padding: 5px; }
        button { background: #ff4655; color: white; border: none; padding: 8px 15px; cursor: pointer; }
        .map-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .map-box { padding: 10px; border: 1px solid #444; text-align: center; cursor: pointer; }
        .picked { background: green; }
    </style>
</head>
<body>
    <h1>VCT ADMIN PANEL</h1>
    
    <div class="card">
        <h3>TEAM A: <input id="tAn" value="TEAM A"> Score: <button onclick="changeScore('A', 1)">+1</button></h3>
        <div id="pListA"></div>
    </div>

    <div class="card">
        <h3>MAP VETO</h3>
        <div class="map-grid" id="mapGrid"></div>
    </div>

    <button style="width:100%; height:50px; font-weight:bold;" onclick="saveAll()">PUSH LIVE UPDATE</button>

    <script>
        let matchData = {
            teamA: { name: "TEAM A", score: 0, players: [{name: "Player 1", hp: 100}, {name: "Player 2", hp: 100}] },
            teamB: { name: "TEAM B", score: 0, players: [{name: "Player 6", hp: 100}] },
            maps: [],
            current_round: 1
        };

        const mapsList = ["Ascent", "Bind", "Haven", "Split", "Icebox", "Lotus", "Sunset"];

        function init() {
            let grid = document.getElementById('mapGrid');
            mapsList.forEach(m => {
                grid.innerHTML += `<div class="map-box" onclick="this.classList.toggle('picked')">${m}</div>`;
            });
        }

        async function saveAll() {
            matchData.teamA.name = document.getElementById('tAn').value;
            await fetch('/api/match', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(matchData)
            });
            alert("Live!");
        }

        function changeScore(team, val) {
            if(team === 'A') matchData.teamA.score += val;
            saveAll();
        }

        init();
    </script>
</body>
</html>
