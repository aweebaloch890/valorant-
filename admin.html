<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - Valorant HUD</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #111; color: white; padding: 20px; text-align: center; font-family: sans-serif; }
        .control-box { background: #222; padding: 20px; margin: 10px auto; max-width: 400px; border-radius: 10px; }
        button { background: #ff4655; border: none; padding: 10px 20px; color: white; font-weight: bold; cursor: pointer; margin: 5px; }
        input { padding: 8px; margin-bottom: 10px; width: 80%; }
    </style>
</head>
<body>
    <h1>MATCH ADMIN</h1>
    <div class="control-box">
        <input type="text" id="tAn" placeholder="Team A Name">
        <br>
        <button onclick="changeScore('teamA_score', 1)">T-A +1</button>
        <button onclick="changeScore('teamA_score', -1)">T-A -1</button>
    </div>
    <div class="control-box">
        <input type="text" id="tBn" placeholder="Team B Name">
        <br>
        <button onclick="changeScore('teamB_score', 1)">T-B +1</button>
        <button onclick="changeScore('teamB_score', -1)">T-B -1</button>
    </div>
    <button onclick="updateNames()" style="background:#00c853">UPDATE NAMES</button>

    <script src="config.js"></script>
    <script>
        const db = firebase.database().ref('matchData');
        let currentData = {};

        db.on('value', (snap) => { currentData = snap.val() || {teamA_score:0, teamB_score:0}; });

        function changeScore(team, val) {
            let newScore = (currentData[team] || 0) + val;
            db.update({ [team]: newScore < 0 ? 0 : newScore });
        }

        function updateNames() {
            db.update({
                teamA_name: document.getElementById('tAn').value || "TEAM A",
                teamB_name: document.getElementById('tBn').value || "TEAM B"
            });
        }
    </script>
</body>
</html>
